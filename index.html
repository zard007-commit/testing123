<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VM State Handler Dashboard</title>
</head>
<body>
    <h2>My Stock State</h2>

    <div style="margin-bottom: 15px; padding: 10px; background: #e9ecef; border-radius: 5px;">
        <strong>Target Endpoint:</strong>
        <label style="margin-left: 10px;">
            <input type="radio" name="endpoint" value="PushToVM" checked onchange="updateBaseUrl()"> Database (PushToVM)
        </label>
        <label style="margin-left: 10px;">
            <input type="radio" name="endpoint" value="PushToVM2" onchange="updateBaseUrl()"> Live VM (PushToVM2)
        </label>
    </div>

    <div id="output" style="font-family: monospace; background: #f4f4f4; padding: 10px; border: 1px solid #ccc; height: 200px; overflow-y: scroll;">
        Initializing...<br>
    </div>

    <div style="margin-top: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 8px;">
        <label for="accountSelect"><b>Account #:</b></label>
        <select id="accountSelect" style="width: 80px; padding: 5px; margin-right: 10px;">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
        </select>

        <br><br>

        <label for="shareCount"><b>Number of Shares:</b></label>
        <input type="number" id="shareCount" value="5" style="width: 60px; padding: 5px; margin-right: 10px;">
        
        <br><br>
        
        <label for="symbol"><b>Symbol:</b></label>
        <input type="text" id="symbol" value="HLF" style="width: 80px; padding: 5px; margin-right: 10px;">
        
        <br><br>
        
        <button onclick="handleTrade('BuyO')" style="padding: 10px 20px; background: #28a745; color: white; border: none; cursor: pointer;">Buy Opened</button>
        <button onclick="handleTrade('BuyF')" style="padding: 10px 20px; background: #dc3545; color: white; border: none; cursor: pointer;">Buy Filled</button>
        <button onclick="handleTrade('Replace')" style="padding: 10px 20px; background: #b4a7d6; color: white; border: none; cursor: pointer;">Replace</button>
        
        <br><br>
        
        <button onclick="handleTrade('CancelSymbol')" style="padding: 10px 20px; background: #6c757d; color: white; border: none; cursor: pointer;">Del_by_Symbol</button>
        <button onclick="handleTrade('Cancel')" style="padding: 10px 20px; background: #6c757d; color: white; border: none; cursor: pointer;">Cancel</button>
        <button onclick="handleTrade('Exit')" style="padding: 10px 20px; background: #22757d; color: white; border: none; cursor: pointer;">Exit</button>
        <button onclick="handleTrade('Idle')" style="padding: 10px 20px; background: #ffc107; color: black; border: none; cursor: pointer;">Idle</button>
        <button onclick="localStorage.removeItem('azure_key'); location.reload();" style="margin-left:10px; font-size: 10px;">Reset Key</button>
    </div>

    <script>
        // Use your specific Azure Function base domain
        const DOMAIN = "https://winfast-func-hscebgb6hkgzbrgd.eastus2-01.azurewebsites.net/api/";
        let CURRENT_URL = DOMAIN + "PushToVM";

        const output = document.getElementById('output');

        // Function to switch URLs when radio button changes
        function updateBaseUrl() {
            const selected = document.querySelector('input[name="endpoint"]:checked').value;
            CURRENT_URL = DOMAIN + selected;
            log(`📡 Switched endpoint to: <b>${selected}</b>`);
        }

        // --- Azure Key Logic ---
        let FUNCTION_KEY = localStorage.getItem('azure_key');
        if (!FUNCTION_KEY) {
            FUNCTION_KEY = prompt("Please enter your Azure Function Key:");
            if (FUNCTION_KEY) {
                localStorage.setItem('azure_key', FUNCTION_KEY);
            }
        }

        function log(message, addNewline = true) {
            output.innerHTML += message + (addNewline ? "<br>" : "");
            output.scrollTop = output.scrollHeight; 
        }

        // --- GET status ---
        async function getState() {
            const url = `${CURRENT_URL}?code=${FUNCTION_KEY}`;
            try {
                const response = await fetch(url);
                const text = await response.text();
                return { value: text };
            } catch (e) {
                return { value: "Error" };
            }
        }

        // --- POST update ---
        async function updateState(value) {
            const url = `${CURRENT_URL}?code=${FUNCTION_KEY}`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ state: value })
            });

            const text = await response.text();
            if (!response.ok) throw new Error(text || "Server Error");

            return { status: "Success", raw: text };
        }

        async function handleTrade(action) {
            // Get values from input fields
            const shareCount = document.getElementById('shareCount').value;
            const accountSelect = document.getElementById('accountSelect').value;
            const symbol = document.getElementById('symbol').value;
            
            let finalValue;
            
            // Build the command string based on action
            switch(action) {
                case 'Exit':
                    finalValue = 'Exit';
                    break;
                //case 'CancelSymbol':
                //    finalValue = `CancelSymbol ${symbol}`;
                //    break;
                //case 'Cancel':
                //    finalValue = `Cancel ${shareCount}`;
                //    break;
                case 'Idle':
                    finalValue = 'idle';
                    break;
                default:
                    finalValue = `${action} ${shareCount} ${accountSelect} ${symbol}`;
            }

            log(`\n🚀 Sending to ${document.querySelector('input[name="endpoint"]:checked').value}: <b>${finalValue}</b>... `, false);

            try {
                const result = await updateState(finalValue);
                log(`✅ Success!`);

                // Wait a moment then verify
                setTimeout(async () => {
                    const current = await getState();
                    log(`📖 Verification: <span style="color:blue">${current.value || "Sent"}</span>`);
                }, 500);
            } catch (err) {
                log(`<span style="color:red">❌ Failed: ${err.message}</span>`);
            }
        }

        log("System Ready. Waiting for command...");
    </script>
</body>
</html>
